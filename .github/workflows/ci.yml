name: CI Pipeline  # 工作流名称，会在GitHub Actions页面显示

# 什么时候触发
on:
  push:
    branches: [ main ]    # 推送到main分支时触发
  pull_request:
    branches: [ main ]    # 创建PR到main分支时也触发

# 定义环境变量（整个workflow都能用）
env:
  DOCKERHUB_REPO: tangzihua/devops-flask  # 改成你的

# 具体任务
jobs:
  build-and-push:
    runs-on: ubuntu-latest  # 运行环境（GitHub提供的虚拟机）
    
    steps:
      # 第1步：拉取代码
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 第2步：登录Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      # 第3步：构建并推送镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .                    # Dockerfile所在目录
          push: true                    # 构建完直接推送
          tags: |
            ${{ env.DOCKERHUB_REPO }}:latest
            ${{ env.DOCKERHUB_REPO }}:${{ github.sha }}  # 用commit SHA做标签
      
      # 第4步：验证（可选）
      - name: Verify pushed image
        run: echo "镜像已推送: ${{ env.DOCKERHUB_REPO }}:${{ github.sha }}"
